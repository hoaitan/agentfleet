# golangci-lint configuration for agentfleet (v2 schema).
# https://golangci-lint.run/usage/configuration/
#
# golangci-lint-action@v6 installs golangci-lint v2, which uses this schema.
# We run the standard linter set (govet, ineffassign, staticcheck, unused)
# minus errcheck for now: the codebase intentionally ignores several errors
# (sockets, best-effort cleanup) that are not yet annotated with //nolint.
# Re-enable errcheck — and add gosec/revive — after an annotation cleanup pass.
version: "2"

run:
  modules-download-mode: vendor

linters:
  default: standard
  disable:
    - errcheck
