# golangci-lint configuration for agentfleet.
# https://golangci-lint.run/usage/configuration/
run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec          # security-focused checks
    - bodyclose      # ensure HTTP response bodies are closed
    - noctx          # find HTTP requests without context
    - errorlint      # correct error wrapping/comparison

issues:
  exclude-rules:
    # Test files may be a bit looser.
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  # Show all issues, don't cap per-linter.
  max-issues-per-linter: 0
  max-same-issues: 0
