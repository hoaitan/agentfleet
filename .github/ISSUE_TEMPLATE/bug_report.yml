name: Bug report
description: Report a problem with agentfleet
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security vulnerabilities**, please do not
        use this form — follow the security policy and report privately.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (and code/config if possible) to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: agentfleet version / commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS and Go version
      placeholder: "e.g. macOS 14, go1.22"
    validations:
      required: true
